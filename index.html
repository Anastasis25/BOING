<body>
  <h1>BOING</h1>
  <canvas id="game" tabindex="0"></canvas>
  <div class="info">
    <strong>1P:</strong> W/S or &uarr;/&darr; or mouse &nbsp;|&nbsp; <strong>2P:</strong> top player uses A/D, bottom uses &larr;/&rarr; (mobile: drag your side)<br>
    First to 7 wins. Press <strong>SPACE</strong> to serve.
  </div>

  <div id="menu">
    <h2>BOING</h2>
    <div class="menu-buttons-row">
      <button class="btn" id="btn1p">1 PLAYER vs CPU</button>
      <button class="btn" id="btn2p">2 PLAYERS</button>
      <button class="btn small" id="btnInstall">📱 ADD TO HOME SCREEN</button>
    </div>
    <div class="hint" id="orientationHint"></div>
  </div>

  <div id="installModal">
    <div class="modal-box">
      <h3>ADD TO HOME SCREEN</h3>
      <div id="installInstructions"></div>
      <button class="modal-close" id="closeInstall">GOT IT</button>
    </div>
  </div>

<script>
(() => {
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const menu = document.getElementById('menu');
const orientationHint = document.getElementById('orientationHint');

let mode = null;
let isPortrait = false;
let W = 800, H = 500;
const WIN_SCORE = 7;
const paddle = { thick: 12, len: 90, speed: 7 };
const p1 = { pos: 0, score: 0 };
const p2 = { pos: 0, score: 0 };
const ball = { x: 0, y: 0, size: 12, vx: 0, vy: 0, speed: 5, live: false };
let gameOver = false;
let messageText = '';
let messageTimer = 0;
const keys = {};
let p1Touch = null, p2Touch = null;
let mouseActive = false;
let mousePos = 0;

function resize() {
  const margin = (window.innerWidth < 600 || window.innerHeight < 600) ? 0 : 40;
  const titleSpace = (window.innerWidth < 600 || window.innerHeight < 600) ? 0 : 160;
  const availW = window.innerWidth - margin;
  const availH = window.innerHeight - titleSpace;
  isPortrait = availH > availW;
  if (isPortrait) {
    W = Math.min(availW, 600);
    H = Math.min(availH, W * 1.6);
  } else {
    H = Math.min(availH, 600);
    W = Math.min(availW, H * 1.6);
  }
  canvas.width = W;
  canvas.height = H;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  const axisLen = isPortrait ? W : H;
  p1.pos = axisLen/2 - paddle.len/2;
  p2.pos = axisLen/2 - paddle.len/2;
  if (!ball.live) {
    ball.x = W/2 - ball.size/2;
    ball.y = H/2 - ball.size/2;
  }
}
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', resize);

function paddleRect(player, which) {
  if (isPortrait) {
    const y = which === 'p1' ? H - 20 - paddle.thick : 20;
    return { x: player.pos, y, w: paddle.len, h: paddle.thick };
  } else {
    const x = which === 'p1' ? 20 : W - 20 - paddle.thick;
    return { x, y: player.pos, w: paddle.thick, h: paddle.len };
  }
}

function serve() {
  ball.x = W/2 - ball.size/2;
  ball.y = H/2 - ball.size/2;
  const angle = (Math.random() * 0.5 - 0.25) * Math.PI;
  const dir = Math.random() < 0.5 ? -1 : 1;
  ball.speed = 5;
  if (isPortrait) {
    ball.vy = Math.cos(angle) * ball.speed * dir;
    ball.vx = Math.sin(angle) * ball.speed;
  } else {
    ball.vx = Math.cos(angle) * ball.speed * dir;
    ball.vy = Math.sin(angle) * ball.speed;
  }
  ball.live = true;
}

function resetGame() {
  p1.score = 0; p2.score = 0;
  gameOver = false;
  ball.live = false;
  ball.x = W/2 - ball.size/2;
  ball.y = H/2 - ball.size/2;
  ball.vx = 0; ball.vy = 0;
}

function showMessage(t) { messageText = t; messageTimer = 90; }

function bounceOff(player, which) {
  const r = paddleRect(player, which);
  if (isPortrait) {
    const center = r.x + r.w/2;
    const offset = (ball.x + ball.size/2 - center) / (r.w/2);
    const angle = Math.max(-1, Math.min(1, offset)) * (Math.PI / 3);
    const dir = ball.vy < 0 ? 1 : -1;
    ball.speed = Math.min(ball.speed + 0.3, 13);
    ball.vy = Math.cos(angle) * ball.speed * dir;
    ball.vx = Math.sin(angle) * ball.speed;
    if (dir === 1) ball.y = r.y + r.h;
    else ball.y = r.y - ball.size;
  } else {
    const center = r.y + r.h/2;
    const offset = (ball.y + ball.size/2 - center) / (r.h/2);
    const angle = Math.max(-1, Math.min(1, offset)) * (Math.PI / 3);
    const dir = ball.vx < 0 ? 1 : -1;
    ball.speed = Math.min(ball.speed + 0.3, 13);
    ball.vx = Math.cos(angle) * ball.speed * dir;
    ball.vy = Math.sin(angle) * ball.speed;
    if (dir === 1) ball.x = r.x + r.w;
    else ball.x = r.x - ball.size;
  }
}

function rectsOverlap(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x &&
         a.y < b.y + b.h && a.y + a.h > b.y;
}

function update() {
  const axisLen = isPortrait ? W : H;
  let p1Target = null;
  if (p1Touch !== null) p1Target = p1Touch - paddle.len/2;
  else if (mouseActive && mode === '1p') p1Target = mousePos - paddle.len/2;

  if (p1Target !== null) {
    p1.pos = p1Target;
  } else {
    if (mode === '1p') {
      if (keys['w'] || keys['arrowup'] || keys['arrowleft']) p1.pos -= paddle.speed;
      if (keys['s'] || keys['arrowdown'] || keys['arrowright']) p1.pos += paddle.speed;
    } else {
      if (isPortrait) {
        if (keys['arrowleft']) p1.pos -= paddle.speed;
        if (keys['arrowright']) p1.pos += paddle.speed;
      } else {
        if (keys['arrowup']) p1.pos -= paddle.speed;
        if (keys['arrowdown']) p1.pos += paddle.speed;
      }
    }
  }
  p1.pos = Math.max(0, Math.min(axisLen - paddle.len, p1.pos));

  if (mode === '1p') {
    const r = paddleRect(p2, 'p2');
    const center = isPortrait ? (r.x + r.w/2) : (r.y + r.h/2);
    const target = isPortrait ? (ball.x + ball.size/2) : (ball.y + ball.size/2);
    const diff = target - center;
    if (Math.abs(diff) > 6) p2.pos += Math.sign(diff) * 5;
  } else {
    if (p2Touch !== null) {
      p2.pos = p2Touch - paddle.len/2;
    } else {
      if (isPortrait) {
        if (keys['a']) p2.pos -= paddle.speed;
        if (keys['d']) p2.pos += paddle.speed;
      } else {
        if (keys['w']) p2.pos -= paddle.speed;
        if (keys['s']) p2.pos += paddle.speed;
      }
    }
  }
  p2.pos = Math.max(0, Math.min(axisLen - paddle.len, p2.pos));

  if (messageTimer > 0) messageTimer--;
  if (!ball.live) return;

  ball.x += ball.vx;
  ball.y += ball.vy;

  if (isPortrait) {
    if (ball.x <= 0) { ball.x = 0; ball.vx *= -1; }
    if (ball.x + ball.size >= W) { ball.x = W - ball.size; ball.vx *= -1; }
  } else {
    if (ball.y <= 0) { ball.y = 0; ball.vy *= -1; }
    if (ball.y + ball.size >= H) { ball.y = H - ball.size; ball.vy *= -1; }
  }

  const ballRect = { x: ball.x, y: ball.y, w: ball.size, h: ball.size };
  const r1 = paddleRect(p1, 'p1');
  const r2 = paddleRect(p2, 'p2');

  if (isPortrait) {
    if (ball.vy > 0 && rectsOverlap(ballRect, r1)) bounceOff(p1, 'p1');
    else if (ball.vy < 0 && rectsOverlap(ballRect, r2)) bounceOff(p2, 'p2');
  } else {
    if (ball.vx < 0 && rectsOverlap(ballRect, r1)) bounceOff(p1, 'p1');
    else if (ball.vx > 0 && rectsOverlap(ballRect, r2)) bounceOff(p2, 'p2');
  }

  if (isPortrait) {
    if (ball.y + ball.size < 0) { p1.score++; showMessage(mode === '1p' ? 'You score!' : 'Bottom scores'); endRally(); }
    else if (ball.y > H) { p2.score++; showMessage(mode === '1p' ? 'CPU scores' : 'Top scores'); endRally(); }
  } else {
    if (ball.x + ball.size < 0) { p2.score++; showMessage(mode === '1p' ? 'CPU scores' : 'Right scores'); endRally(); }
    else if (ball.x > W) { p1.score++; showMessage(mode === '1p' ? 'You score!' : 'Left scores'); endRally(); }
  }
}

function endRally() {
  ball.live = false;
  ball.x = W/2 - ball.size/2;
  ball.y = H/2 - ball.size/2;
  ball.vx = 0; ball.vy = 0;
  if (p1.score >= WIN_SCORE || p2.score >= WIN_SCORE) gameOver = true;
}

function draw() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);
  ctx.strokeStyle = '#1a4d3a';
  ctx.lineWidth = 2;
  ctx.setLineDash([10, 12]);
  ctx.beginPath();
  if (isPortrait) { ctx.moveTo(0, H/2); ctx.lineTo(W, H/2); }
  else { ctx.moveTo(W/2, 0); ctx.lineTo(W/2, H); }
  ctx.stroke();
  ctx.setLineDash([]);

  ctx.fillStyle = '#00ff88';
  ctx.font = `bold ${Math.floor(Math.min(W,H)*0.12)}px Courier New`;
  ctx.textAlign = 'center';
  if (isPortrait) {
    ctx.fillText(p2.score, W*0.25, H/2 - 20);
    ctx.fillText(p1.score, W*0.75, H/2 + 60);
  } else {
    ctx.fillText(p1.score, W/2 - 80, 80);
    ctx.fillText(p2.score, W/2 + 80, 80);
  }

  ctx.fillStyle = '#00ff88';
  ctx.shadowColor = '#00ff88';
  ctx.shadowBlur = 12;
  const r1 = paddleRect(p1, 'p1');
  const r2 = paddleRect(p2, 'p2');
  ctx.fillRect(r1.x, r1.y, r1.w, r1.h);
  ctx.fillRect(r2.x, r2.y, r2.w, r2.h);

  ctx.fillStyle = '#fff';
  ctx.shadowColor = '#fff';
  ctx.shadowBlur = 18;
  ctx.fillRect(ball.x, ball.y, ball.size, ball.size);
  ctx.shadowBlur = 0;

  if (messageTimer > 0) {
    ctx.fillStyle = '#00ff88';
    ctx.font = `${Math.floor(Math.min(W,H)*0.04)}px Courier New`;
    ctx.fillText(messageText, W/2, H*0.15);
  }

  if (gameOver) {
    let winner;
    const youWin = p1.score >= WIN_SCORE;
    if (mode === '1p') winner = youWin ? 'YOU WIN!' : 'CPU WINS';
    else if (isPortrait) winner = youWin ? 'BOTTOM WINS!' : 'TOP WINS!';
    else winner = youWin ? 'LEFT WINS!' : 'RIGHT WINS!';
    ctx.font = `bold ${Math.floor(Math.min(W,H)*0.08)}px Courier New`;
    ctx.fillStyle = (mode === '1p' && !youWin) ? '#ff4466' : '#00ff88';
    ctx.fillText(winner, W/2, H/2 - 10);
    ctx.font = `${Math.floor(Math.min(W,H)*0.028)}px Courier New`;
    ctx.fillStyle = '#aaa';
    ctx.fillText('SPACE or tap to play again', W/2, H/2 + 30);
  } else if (!ball.live) {
    ctx.font = `${Math.floor(Math.min(W,H)*0.03)}px Courier New`;
    ctx.fillStyle = '#888';
    ctx.fillText('SPACE or tap to serve', W/2, H*0.55);
  }
}

function loop() { update(); draw(); requestAnimationFrame(loop); }

window.addEventListener('keydown', e => {
  const k = e.key.toLowerCase();
  keys[k] = true;
  if (e.key === ' ' || e.code === 'Space') {
    e.preventDefault();
    if (mode === null) return;
    if (gameOver) resetGame();
    else if (!ball.live) serve();
  }
  if (['arrowup','arrowdown','arrowleft','arrowright'].includes(k) || e.code === 'Space') {
    e.preventDefault();
  }
  if (['w','s','a','d','arrowup','arrowdown','arrowleft','arrowright'].includes(k)) {
    mouseActive = false;
  }
});
window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

canvas.addEventListener('mousemove', e => {
  if (mode !== '1p') return;
  const rect = canvas.getBoundingClientRect();
  mousePos = isPortrait
    ? (e.clientX - rect.left) * (W / rect.width)
    : (e.clientY - rect.top) * (H / rect.height);
  mouseActive = true;
});
canvas.addEventListener('click', () => {
  if (mode === null) return;
  if (gameOver) resetGame();
  else if (!ball.live) serve();
});

function touchCoord(t) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (t.clientX - rect.left) * (W / rect.width),
    y: (t.clientY - rect.top) * (H / rect.height)
  };
}

function assignTouch(t) {
  const c = touchCoord(t);
  if (mode === '1p') {
    p1Touch = isPortrait ? c.x : c.y;
    return 'p1';
  }
  if (isPortrait) {
    if (c.y > H/2) { p1Touch = c.x; return 'p1'; }
    else { p2Touch = c.x; return 'p2'; }
  } else {
    if (c.x < W/2) { p1Touch = c.y; return 'p1'; }
    else { p2Touch = c.y; return 'p2'; }
  }
}

const activeTouches = {};
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (mode === null) return;
  for (const t of e.changedTouches) {
    activeTouches[t.identifier] = assignTouch(t);
  }
  if (gameOver) resetGame();
  else if (!ball.live) serve();
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    const which = activeTouches[t.identifier];
    if (!which) continue;
    const c = touchCoord(t);
    const v = isPortrait ? c.x : c.y;
    if (which === 'p1') p1Touch = v;
    else p2Touch = v;
  }
}, { passive: false });

function endTouch(e) {
  for (const t of e.changedTouches) {
    const which = activeTouches[t.identifier];
    if (which === 'p1') p1Touch = null;
    else if (which === 'p2') p2Touch = null;
    delete activeTouches[t.identifier];
  }
}
canvas.addEventListener('touchend', endTouch);
canvas.addEventListener('touchcancel', endTouch);

function startGame(m) {
  mode = m;
  resetGame();
  menu.style.display = 'none';
  canvas.focus();
}
document.getElementById('btn1p').addEventListener('click', () => startGame('1p'));
document.getElementById('btn2p').addEventListener('click', () => startGame('2p'));

// ---------- Install / Add to Home Screen ----------
const installModal = document.getElementById('installModal');
const installInstructions = document.getElementById('installInstructions');

function detectPlatform() {
  const ua = navigator.userAgent;
  // iPadOS 13+ reports as Mac, but has touch
  const isIOS = /iPhone|iPad|iPod/.test(ua) ||
                (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
  const isAndroid = /Android/.test(ua);
  const isSafari = /^((?!chrome|android|crios|fxios).)*safari/i.test(ua);
  const isChrome = /Chrome|CriOS/.test(ua) && !/Edg/.test(ua);
  const isStandalone = window.matchMedia('(display-mode: standalone)').matches ||
                       window.navigator.standalone === true;
  return { isIOS, isAndroid, isSafari, isChrome, isStandalone };
}

function buildInstructions() {
  const p = detectPlatform();
  if (p.isStandalone) {
    return `<p style="color:#00ff88">✓ Boing is already installed on this device. You're playing the installed version right now!</p>`;
  }
  if (p.isIOS) {
    if (!p.isSafari) {
      return `
        <p>iOS only allows installing web apps from <strong style="color:#00ff88">Safari</strong>. Tap the share menu in your current browser, choose "Open in Safari," then follow these steps:</p>
        <div class="platform">iPhone / iPad — Safari</div>
        <ol>
          <li>Tap the <strong>Share button</strong> at the bottom of Safari (square with an up arrow ⬆).</li>
          <li>Scroll down and tap <strong>Add to Home Screen</strong>.</li>
          <li>Tap <strong>Add</strong> in the top-right corner.</li>
        </ol>
        <p>The Boing icon will appear on your home screen. Tap it to launch full-screen.</p>`;
    }
    return `
      <div class="platform">iPhone / iPad</div>
      <ol>
        <li>Tap the <strong>Share button</strong> at the bottom of Safari (square with an up arrow ⬆).</li>
        <li>Scroll down and tap <strong>Add to Home Screen</strong>.</li>
        <li>Tap <strong>Add</strong> in the top-right corner.</li>
      </ol>
      <p>The Boing icon will appear on your home screen. Tap it to launch full-screen.</p>`;
  }
  if (p.isAndroid) {
    return `
      <div class="platform">Android</div>
      <ol>
        <li>Tap the <strong>⋮ menu</strong> (three dots, top right of Chrome).</li>
        <li>Tap <strong>Add to Home screen</strong> or <strong>Install app</strong>.</li>
        <li>Tap <strong>Add</strong> or <strong>Install</strong> to confirm.</li>
      </ol>
      <p>Boing will appear in your app drawer and on your home screen.</p>`;
  }
  return `
    <div class="platform">Desktop</div>
    <ol>
      <li>Look for an <strong>install icon</strong> (often a small computer-with-arrow) in the right side of your address bar in Chrome or Edge.</li>
      <li>Click it and choose <strong>Install</strong>.</li>
    </ol>
    <p>On phones, open this same link in your mobile browser to add Boing to your home screen.</p>`;
}

document.getElementById('btnInstall').addEventListener('click', () => {
  installInstructions.innerHTML = buildInstructions();
  installModal.classList.add('show');
});
document.getElementById('closeInstall').addEventListener('click', () => {
  installModal.classList.remove('show');
});
installModal.addEventListener('click', e => {
  if (e.target === installModal) installModal.classList.remove('show');
});

function updateOrientationHint() {
  if (window.innerWidth < 600) {
    orientationHint.textContent = isPortrait
      ? '📱 Portrait — paddles top & bottom. Drag your half of the screen.'
      : '📱 Landscape — paddles left & right. Drag your half.';
  } else {
    orientationHint.textContent = 'Tip: works on phones too — rotate to switch layouts.';
  }
}

resize();
updateOrientationHint();
window.addEventListener('resize', updateOrientationHint);
loop();
})();
</script>
